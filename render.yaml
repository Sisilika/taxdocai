services:
  - type: web
    name: taxdocai-backend
    runtime: python
    plan: free
    buildCommand: "apt-get update && apt-get install -y tesseract-ocr poppler-utils && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: /opt/render/project/src/chroma_store
